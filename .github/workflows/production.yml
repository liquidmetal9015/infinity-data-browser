name: Production Deployment Pipeline

on:
  workflow_dispatch:

# Required for Workload Identity Federation
permissions:
  contents: 'read'
  id-token: 'write'

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm ci

      - name: Frontend ESLint
        run: npm run lint

      - name: Frontend TypeScript check
        run: npx tsc --noEmit

      - name: Install backend-ts dependencies
        working-directory: ./backend-ts
        run: npm ci

      - name: Backend-ts ESLint
        working-directory: ./backend-ts
        run: npm run lint

      - name: Backend-ts TypeScript check
        working-directory: ./backend-ts
        run: npm run typecheck

      - name: Frontend & shared tests
        run: npm test -- --run

      - name: Backend-ts tests
        working-directory: ./backend-ts
        run: npm test

  deploy:
    name: CI/CD - Build, Migrate, and Deploy
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (Workload Identity Federation)
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/562594391181/locations/global/workloadIdentityPools/github-actions-pool/providers/github-actions-provider'
          service_account: 'github-actions-sa@infinity-os-494622.iam.gserviceaccount.com'

      - name: Set up Node for Migrations
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install backend-ts dependencies for migrations
        working-directory: ./backend-ts
        run: npm ci

      - name: Setup Cloud SQL Proxy
        run: |
          curl -o cloud-sql-proxy https://storage.googleapis.com/cloud-sql-connectors/cloud-sql-proxy/v2.11.0/cloud-sql-proxy.linux.amd64
          chmod +x cloud-sql-proxy
          ./cloud-sql-proxy infinity-os-494622:us-central1:infinity-db-instance --port 5432 &
          sleep 3

      - name: Execute Drizzle Database Migrations
        working-directory: ./backend-ts
        env:
          DATABASE_URL: 'postgresql://postgres:${{ secrets.DB_PASSWORD }}@127.0.0.1:5432/infinity'
        run: npm run db:migrate
          
      - name: Inject Frontend Firebase Configuration
        # Writes client secrets for Vite to bundle into the frontend remotely
        run: |
          cat <<EOF > .env.production
          VITE_FIREBASE_API_KEY=${{ secrets.FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN=${{ secrets.FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID=${{ secrets.FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET=${{ secrets.FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID=${{ secrets.FIREBASE_APP_ID }}
          EOF
          
      - name: Deploy Unified Container to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: 'infinity-data-explorer'
          region: 'us-central1'
          source: '.' # Uploads everything and triggers the Multi-stage Docker build remotely via Cloud Build
          env_vars: |
            DATABASE_URL=postgresql://postgres:${{ secrets.DB_PASSWORD }}@/infinity?host=/cloudsql/infinity-os-494622:us-central1:infinity-db-instance
            CORS_ORIGINS=*
            DEV_AUTH=false
            LLM_PROVIDER=anthropic
            LLM_MODEL=claude-haiku-4-5-20251001
          secrets: |
            FIREBASE_ADMIN_CREDENTIALS=firebase-admin-key:latest
