[project]
name = "infinity-data-backend"
version = "0.1.0"
description = "FastAPI backend for Infinity Data Explorer"
authors = [{ name = "clindbeck9" }]
readme = "README.md"
requires-python = ">=3.12, <3.14"
dependencies = [
    "fastapi==0.115.12",
    "uvicorn[standard]==0.34.3",
    "sqlalchemy[asyncio]==2.0.41",
    "asyncpg==0.31.0",
    "alembic==1.15.2",
    "pydantic==2.11.4",
    "pydantic-settings==2.9.1",
    "pytest==8.4.0",
    "pytest-asyncio==1.0.0",
    "httpx==0.28.1",
    "google-auth==2.40.3",
    "firebase-admin==7.4.0"
]

[dependency-groups]
dev = [
    "ruff",
    "mypy"
]

[tool.ruff]
line-length = 88
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "W", "UP", "B", "C4"]
ignore = ["B008", "E501", "F821"]

[tool.mypy]
python_version = "3.12"
strict = true
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = ["app.models.*"]
# SQLAlchemy string-quoted forward references in relationship() calls trigger name-defined
disable_error_code = ["name-defined"]

[[tool.mypy.overrides]]
module = ["app.schemas.*"]
# Pydantic partial-update schemas intentionally redefine fields as Optional
disable_error_code = ["assignment"]

[[tool.mypy.overrides]]
module = ["app.auth"]
# firebase_admin.auth.verify_id_token() returns Any
disable_error_code = ["no-any-return"]
