repos:
  # Python: ruff for lint + format
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.13
    hooks:
      - id: ruff
        args: [--fix]
        files: ^backend/
      - id: ruff-format
        files: ^backend/

  # Python: mypy strict type check
  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: bash -c 'cd backend && uv run mypy .'
        language: system
        types: [python]
        pass_filenames: false

      # TypeScript: type check
      - id: tsc
        name: TypeScript type check
        entry: npx tsc --noEmit
        language: node
        types_or: [ts, tsx]
        pass_filenames: false

      # TypeScript/JS: ESLint
      - id: eslint
        name: ESLint
        entry: npx eslint --max-warnings=0
        language: node
        types_or: [ts, tsx]
        pass_filenames: true
